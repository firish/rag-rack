name: CI

on:
  push:
    branches: [main, "phase/*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install dev deps
        run: uv pip install --system -e ".[dev]"
      - name: Ruff
        run: ruff check src/ tests/
      - name: Ruff format
        run: ruff format --check src/ tests/
      - name: Mypy
        run: mypy src/verifiable_rag/

  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install
        run: uv pip install --system -e ".[dev]"
      - name: Run smoke tests
        run: pytest -m smoke -v

  # Eval runs only on main or when the PR touches src/
  # Results are posted as a PR comment by the bot
  eval:
    name: Eval on benchmark subset
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install
        run: uv pip install --system -e ".[dev,eval]"
      - name: Run eval (CI subset)
        run: pytest -m eval --ci-subset -v
        continue-on-error: true  # don't block PRs while harness is being built
